  <script>

      // Carga el HTML remoto y fuerza base href para rutas relativas.
      var remoteUrl = "https://mukvhdxlmtjdpbpodfht.supabase.co/storage/v1/object/public/games/external/agent_p_rebel_spy/content/play.disney.com/html5/phf_spl_plt_agentprebelspy/index_local2.html";
      var cacheKey = "agent_p_rebel_spy:index_local2:v1";
      var status = document.getElementById("status");

      function getBaseHref(url) {
        var idx = url.lastIndexOf("/");
        return idx === -1 ? url : url.slice(0, idx + 1);
      }

      function injectBase(html, baseHref) {
        // Parchea CORS para evitar canvas tainted en Phaser.
        var corsPatch =
          "<script>(function(){try{if(window.__cors_patched)return;window.__cors_patched=true;var O=window.Image;window.Image=function(w,h){var i=new O(w,h);i.crossOrigin='anonymous';return i;};if(O&&O.prototype){try{O.prototype.crossOrigin='anonymous';}catch(e){}}if(window.Phaser&&window.Phaser.Loader){window.Phaser.Loader.crossOrigin='anonymous';}}catch(e){}})();</" + "script>";
        var baseTag = "<base href=\"" + baseHref + "\">";
        var headMatch = html.match(/<head[^>]*>/i);
        if (headMatch) {
          return html.replace(/<head[^>]*>/i, headMatch[0] + "\n  " + baseTag + "\n  " + corsPatch);
        }
        return baseTag + "\n" + corsPatch + "\n" + html;
      }

      function renderHtml(html) {
        var baseHref = getBaseHref(remoteUrl);
        var finalHtml = injectBase(html, baseHref);
        document.open();
        document.write(finalHtml);
        document.close();
      }

      // Intenta usar cache de localStorage para acelerar entre sesiones.
      try {
        var cached = localStorage.getItem(cacheKey) || sessionStorage.getItem(cacheKey);
        if (cached && cached.length > 100) {
          renderHtml(cached);
          return;
        }
      } catch (e) {}

      var fallbackTimer = setTimeout(function () {
        // Si el remoto tarda demasiado, abre la version local.
        if (status) status.textContent = "Carga lenta. Abriendo version local...";
        window.location.replace("play.html");
      }, 8000);

      fetch(remoteUrl, { cache: "force-cache" })
        .then(function (res) {
          if (!res.ok) throw new Error("HTTP " + res.status);
          return res.text();
        })
        .then(function (html) {
          clearTimeout(fallbackTimer);
          try { localStorage.setItem(cacheKey, html); } catch (e) {}
          try { sessionStorage.setItem(cacheKey, html); } catch (e) {}
          renderHtml(html);
        })
        .catch(function (err) {
          clearTimeout(fallbackTimer);
          if (status) status.textContent = "No se pudo cargar el juego: " + err.message;

    })();
