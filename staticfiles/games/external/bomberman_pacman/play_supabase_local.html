<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bomberman Pacman</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #000;
      overflow: hidden;
    }
    #host {
      width: 100%;
      height: 100%;
    }
    #status {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      color: #ddd;
      font: 600 16px/1 Arial, sans-serif;
    }
  </style>
</head>
<body>
  <div id="host"><div id="status">Cargando emulador...</div></div>
  <script>
  (function () {
    var host = document.getElementById("host");
    if (!host) return;

    var swfUrl = "https://mukvhdxlmtjdpbpodfht.supabase.co/storage/v1/object/public/games/external/bomberman_pacman/content/uploads.ungrounded.net/196000/196533_bombermanpacman.swf";
    function mountPlayer() {
      if (typeof window.RufflePlayer === "undefined") return false;
      var ruffle = window.RufflePlayer.newest();
      var player = ruffle.createPlayer();
      player.style.width = "100%";
      player.style.height = "100%";
      host.innerHTML = "";
      host.appendChild(player);
      player.load(swfUrl).catch(function () {
        host.innerHTML = "<div id='status' style='color:#f88'>No se pudo cargar el juego.</div>";
      });
      return true;
    }

    if (mountPlayer()) return;

    var script = document.createElement("script");
    script.src = "https://unpkg.com/@ruffle-rs/ruffle";
    script.async = true;
    script.onload = mountPlayer;
    script.onerror = function () {
      host.innerHTML = "<div id='status' style='color:#f88'>No se pudo cargar Ruffle.</div>";
    };
    document.head.appendChild(script);
  })();
  </script>
</body>
</html>
