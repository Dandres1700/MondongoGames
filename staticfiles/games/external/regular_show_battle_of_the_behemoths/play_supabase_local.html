<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Regular Show: Battle of the Behemoths</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #000;
    }
    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      color: #ddd;
      font: 600 16px/1 Arial, sans-serif;
    }
  </style>
</head>
<body>
  <noscript>
    <a href="https://mukvhdxlmtjdpbpodfht.supabase.co/storage/v1/object/public/games/external/regular_show_battle_of_the_behemoths/content/emea.iframed.cn.dmti.cloud/content/1155/game/battle-of-the-behemoths/ae/battleofbehemoths-160818/index2.html">Abrir juego</a>
  </noscript>
  <div class="status" id="status">Cargando juego...</div>
  <script>
    (function () {
      // Carga el HTML remoto y fuerza base href para rutas relativas.
      var remoteUrl = "https://mukvhdxlmtjdpbpodfht.supabase.co/storage/v1/object/public/games/external/regular_show_battle_of_the_behemoths/content/emea.iframed.cn.dmti.cloud/content/1155/game/battle-of-the-behemoths/ae/battleofbehemoths-160818/index2.html";
      var status = document.getElementById("status");

      function getBaseHref(url) {
        var idx = url.lastIndexOf("/");
        return idx === -1 ? url : url.slice(0, idx + 1);
      }

      function injectBase(html, baseHref) {
        // Parchea CORS para evitar canvas tainted en Phaser.
        var corsPatch =
          "<script>(function(){try{if(window.__cors_patched)return;window.__cors_patched=true;var O=window.Image;window.Image=function(w,h){var i=new O(w,h);i.crossOrigin='anonymous';return i;};if(O&&O.prototype){try{O.prototype.crossOrigin='anonymous';}catch(e){}}if(window.Phaser&&window.Phaser.Loader){window.Phaser.Loader.crossOrigin='anonymous';}}catch(e){}})();</" + "script>";
        var baseTag = "<base href=\"" + baseHref + "\">";
        var headMatch = html.match(/<head[^>]*>/i);
        if (headMatch) {
          return html.replace(/<head[^>]*>/i, headMatch[0] + "\n  " + baseTag + "\n  " + corsPatch);
        }
        return baseTag + "\n" + corsPatch + "\n" + html;
      }

      var fallbackTimer = setTimeout(function () {
        // Si el remoto tarda demasiado, abre la version local.
        if (status) status.textContent = "Carga lenta. Abriendo version local...";
        window.location.replace("play.html");
      }, 8000);

      fetch(remoteUrl, { cache: "force-cache" })
        .then(function (res) {
          if (!res.ok) throw new Error("HTTP " + res.status);
          return res.text();
        })
        .then(function (html) {
          clearTimeout(fallbackTimer);
          var baseHref = getBaseHref(remoteUrl);
          var finalHtml = injectBase(html, baseHref);
          document.open();
          document.write(finalHtml);
          document.close();
        })
        .catch(function (err) {
          clearTimeout(fallbackTimer);
          if (status) status.textContent = "No se pudo cargar el juego: " + err.message;
        });
    })();
  </script>
</body>
</html>
